name: raincheck_mobile
description: AI-powered parametric insurance for delivery riders
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Payments
  razorpay_flutter: ^1.3.7

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Sensors (crash detection)
  sensors_plus: ^6.1.0

  # Device Info (fraud detection)
  device_info_plus: ^11.1.1

  # Networking
  dio: ^5.7.0
  http: ^1.2.2

  # Charts
  fl_chart: ^0.69.0

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Environment
  flutter_dotenv: ^5.1.0

  # UI Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
